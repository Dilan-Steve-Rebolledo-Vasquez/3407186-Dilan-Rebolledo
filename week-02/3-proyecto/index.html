<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- TODO: Cambia el título según tu dominio -->
  <title>Plataforma de Freelancers</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!--
      ============================================
      NOTA PARA EL APRENDIZ:
      ============================================
      Este HTML es una plantilla genérica.
      Debes adaptarlo a tu dominio asignado:

      1. Cambia todos los textos de "Elemento" a tu entidad
      2. Cambia las categorías por las de tu dominio
      3. Agrega campos adicionales si tu dominio lo requiere
      4. Cambia emojis para que sean coherentes con tu dominio

      EJEMPLO (Planetario - NO es un dominio asignable):
      - "Elementos" → "Cuerpos Celestes"
      - Categorías: Planeta, Estrella, Asteroide, etc.
      ============================================
    -->

    <!-- Header -->
    <header class="header">
      <!-- TODO: Cambia el título y emoji según tu dominio -->
      <h1>🧠 Plataforma de Freelancers</h1>
      <div class="stats-summary" id="stats-summary">
        <span class="stat">Total de Freelancers: <strong id="stat-total">0</strong></span>
        <!-- TODO: Cambia "Activos/Inactivos" por términos de tu dominio -->
        <span class="stat">Freelancers Activos: <strong id="stat-active">0</strong></span>
        <span class="stat">Freelancers Inactivos: <strong id="stat-inactive">0</strong></span>
      </div>
    </header>

    <!-- Item Form -->
    <section class="form-section">
      <!-- TODO: Cambia "Elemento" por tu entidad -->
      <h2 id="form-title">➕ Nuevo Proyecto</h2>
      <form id="item-form" class="item-form">
        <input type="hidden" id="item-id" value="">

        <div class="form-group">
          <!-- TODO: Cambia el label y placeholder -->
          <label for="item-name">Nombre *</label>
          <input
            type="text"
            id="item-name"
            placeholder="Nombre del elemento"
            required
          >
        </div>

        <div class="form-group">
          <label for="item-description">Descripción</label>
          <textarea
            id="item-description"
            rows="3"
            placeholder="Detalles adicionales (opcional)"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <!-- TODO: Cambia las categorías según tu dominio -->
            <label for="item-category">Categoría</label>
            <select id="item-category">
              <!--
                EJEMPLO Planetario:
                <option value="planet">🪐 Planeta</option>
                <option value="star">⭐ Estrella</option>
                <option value="asteroid">☄️ Asteroide</option>
              -->
              <option value="web">🌏 Desarrollo Web</option>
              <option value="mobile">📱Desarrollo Movil</option>
              <option value="desing">🖌️ Diseño</option>
              <option value="other">📌 Otro</option>
            </select>
          </div>

          <div class="form-group">
            <!-- TODO: Opcionalmente renombra "Prioridad" según tu dominio -->
            <label for="item-priority">Prioridad/Nivel</label>
            <select id="item-priority">
              <option value="low">🟩 Baja</option>
              <option value="medium" selected>🟨 Media</option>
              <option value="high">🟥 Alta</option>
            </select>
          </div>
        </div>

        <!--
          TODO: Agrega campos adicionales específicos de tu dominio
          EJEMPLO Planetario:
          <div class="form-group">
            <label for="item-magnitude">Magnitud</label>
            <input type="number" id="item-magnitude" step="0.1">
          </div>
        -->
<div class="form-group">
  <label for="item-payment">Método de pago</label>
  <select id="item-payment">
  <option value="PayPal">PayPal</option>
  <option value="Transferencia Bancaria">Transferencia Bancaria</option>
  </select>
</div>
<div class="form-group">
  <label for="item-budget">Presupuesto disponible</label>
  <input
    type="number"
    id="item-budget"
    placeholder="Mínimo 200.000 COP"
    min="0"
  >
</div>
<div class="form-group">
    <label for="item-deadline">Tiempo estimado de entrega</label>
    <input type="text" id="item-deadline" placeholder="Ej: 3 días, 1 semana">
  </div>
    <div class="form-group">
    <label for="item-language">Idioma principal</label>
    <input type="text" id="item-language" placeholder="Español, Inglés...">
  </div>
  <div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            Crear
          </button>
          <button type="button" class="btn btn-secondary" id="cancel-btn">
            Cancelar
          </button>
        </div>
        </div>
      </form>
    </section>

    <!-- Filters & Search -->
    <section class="filters-section">
      <div class="filters">
        <div class="filter-group">
          <label for="filter-status">Estado:</label>
          <select id="filter-status">
            <option value="all">Todos los Freelancers</option>
            <!-- TODO: Cambia los términos según tu dominio -->
            <option value="active">Freelancers Activos</option>
            <option value="inactive">Freelancers Inactivos</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-category">Categoría:</label>
          <select id="filter-category">
            <option value="all">Todas</option>
            <!-- TODO: Repite las mismas categorías del formulario -->
              <option value="web">🌏 Desarrollo Web</option>
              <option value="mobile">📱Desarrollo Movil</option>
              <option value="desing">🖌️ Diseño</option>
              <option value="other">📌 Otro</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-priority">Prioridad:</label>
          <select id="filter-priority">
            <option value="all">Todas</option>
              <option value="low">🟩 Baja</option>
              <option value="medium" selected>🟨 Media</option>
              <option value="high">🟥 Alta</option>
          </select>
        </div>

        <div class="filter-group search-group">
          <label for="search-input">Buscar Freelancers:</label>
          <input
            type="text"
            id="search-input"
            placeholder="Buscar Freelancers..."
          >
        </div>
      </div>
    </section>

    <!-- Item List -->
    <section class="items-section">
      <div class="items-header">
        <!-- TODO: Cambia el título -->
        <h2>👤 Lista de Freelancers</h2>
        <button class="btn btn-outline" id="clear-inactive">
          🗑️ Limpiar Freelancers Inactivos
        </button>
      </div>

      <div id="item-list" class="item-list">
        <!-- Los elementos se renderizarán aquí con JavaScript -->
      </div>

      <div id="empty-state" class="empty-state">
        <p>📭 No hay elementos que mostrar</p>
        <p class="empty-state-hint">Crea tu primer elemento usando el formulario arriba</p>
      </div>
    </section>

    <!-- Detailed Stats -->
    <section class="detailed-stats">
      <h3>📊 Estadísticas de Freelancers</h3>
      <div id="stats-details" class="stats-grid">
        <!-- Las estadísticas se renderizarán aquí con JavaScript -->
      </div>
    </section>
  </div>

  <!-- Script principal -->
  <script src="starter/script.js"></script>
</body>
</html>
